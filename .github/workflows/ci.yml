name: ci

on:
  pull_request:
    branches: [main]

jobs:
  tests:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.0"

      - name: Run Go Tests
        run: go test -cover ./...
  format:
    name: Style
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.0"
      
      - name: Set up Staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@latest

      - name: Check Go Formatting
        run: test -z $(go fmt ./...)

      - name: Run Staticcheck
        run: staticcheck ./...